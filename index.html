<!DOCTYPE html>
<html>
<head>
    <title>Тест</title>
    <!-- Зареждаме библиотеката директно -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="debug">Зареждане...</div>
    <script>
        window.onload = () => {
            const el = document.getElementById('debug');
            if (typeof supabase !== 'undefined') {
                el.innerHTML = "БИБЛИОТЕКАТА Е ЗАРЕДЕНА УСПЕШНО";
            } else {
                el.innerHTML = "КРИТИЧНА ГРЕШКА: supabase не е дефиниран";
            }
        };
    </script>
</body>
</html>
