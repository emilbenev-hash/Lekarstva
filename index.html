<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Здравен мениджър</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #fff; }
        #search-box { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border: 1px solid #ccc; background: #f8f8f8; cursor: pointer; font-size: 14px; }
        #details { margin-top: 20px; padding: 10px; border-top: 2px solid #333; }
    </style>
</head>
<body>

    <input type="text" id="search-box" placeholder="Търси лекарство...">
    <div id="med-buttons" class="btn-list"></div>
    <div id="details"></div>

    <script>
        const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);

        async function loadMedications() {
            const { data, error } = await client.from('medications').select('*');
            if (error) return;

            const container = document.getElementById('med-buttons');
            container.innerHTML = data.map(med => `
                <button onclick="showDetails('${med.name_bg}')">${med.name_bg}</button>
            `).join('');
        }

        function showDetails(name) {
            document.getElementById('details').innerHTML = `<h3>Детайли за: ${name}</h3><p>Данните се зареждат...</p>`;
            // Тук се закача логиката, която използвате в десктоп версията
        }

        document.getElementById('search-box').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('#med-buttons button').forEach(btn => {
                btn.style.display = btn.innerText.toLowerCase().includes(val) ? 'block' : 'none';
            });
        };

        window.onload = loadMedications;
    </script>
</body>
</html>
