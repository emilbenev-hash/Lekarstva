<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Здравен мениджър</title>
    <script src="config.js"></script>
    <style>
        body { font-family: sans-serif; background: #667eea; padding: 10px; }
        .card { background: white; padding: 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; }
        .panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; padding: 20px; display: none; }
    </style>
</head>
<body>
    <h1>Здравен мениджър</h1>
    <input type="text" id="search" placeholder="Търси..." oninput="renderUI()">
    <div id="medGrid"></div>

    <div id="editPanel" class="panel">
        <h2 id="panelTitle"></h2>
        <input type="text" id="editName">
        <button onclick="saveMed()">ЗАПАЗИ</button>
        <button onclick="document.getElementById('editPanel').style.display='none'">ОТКАЗ</button>
    </div>

    <script>
        let state = { meds: [] };
        
        async function refreshData() {
            const h = { 'apikey': CONFIG.KEY, 'Authorization': 'Bearer ' + CONFIG.KEY };
            const res = await fetch(CONFIG.URL + '/rest/v1/medications?select=*', {headers: h});
            state.meds = await res.json();
            renderUI();
        }

        function renderUI() {
            const search = document.getElementById('search').value.toLowerCase();
            document.getElementById('medGrid').innerHTML = state.meds
                .filter(m => m.name_bg.toLowerCase().includes(search))
                .map(m => `<div class="card" onclick="openPanel('${m.id}')"><h3>${m.name_bg}</h3></div>`).join('');
        }

        function openPanel(id) {
            const m = state.meds.find(x => x.id == id);
            document.getElementById('panelTitle').innerText = m.name_bg;
            document.getElementById('editPanel').style.display = 'block';
        }
        
        window.onload = refreshData;
    </script>
</body>
</html>
