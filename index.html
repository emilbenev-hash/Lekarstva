<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Здравен мениджър</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="status" style="padding: 20px; font-family: sans-serif;">
        <h2>Статус на зареждане:</h2>
        <div id="log">Започване...</div>
    </div>

    <script>
        const log = (msg) => document.getElementById('log').innerHTML += `<p>${msg}</p>`;
        
        try {
            log("Инициализиране на Supabase...");
            const SUPABASE_URL = 'https://xwnjuqqudkjkqdkrndhg.supabase.com/rest/v1/';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3bmp1cXF1ZGtqa3Fka3JuZGhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODIzMTUsImV4cCI6MjA5ODU1ODMxNX0.CjTGOpfbETipi2HRegcGyvN9cGzSeQePFO0Sgc9Gt34'; // Попълнете тук

            const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            async function test() {
                log("Изпращане на заявка към таблица 'medications'...");
                const { data, error } = await supabase.from('medications').select('*');
                
                if (error) {
                    log(`<span style="color:red">ГРЕШКА: ${error.message}</span>`);
                } else {
                    log(`<span style="color:green">УСПЕХ! Намерени записи: ${data.length}</span>`);
                    if(data.length > 0) {
                        log(`Първо лекарство: ${data[0].name_bg}`);
                    }
                }
            }
            test();
        } catch (e) {
            log(`<span style="color:red">КРИТИЧНА ГРЕШКА: ${e.message}</span>`);
        }
    </script>
</body>
</html>
