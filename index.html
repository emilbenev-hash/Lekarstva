<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Здравен мениджър (Mobile)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #667eea; padding: 10px; margin: 0; }
        .header { background: #148F77; color: white; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 10px; }
        .filters { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .search-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .filter-buttons { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .filter-btn { flex: 1; padding: 10px; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-size: 14px; }
        .filter-btn.active { background: #148F77; color: white; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .panel { position: fixed; right: 0; top: 0; width: 100%; height: 100%; background: white; padding: 20px; display: none; overflow-y: auto; z-index: 1000; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header"><h1>Здравен мениджър</h1></div>
    <div class="filters">
        <input type="text" id="search" class="search-input" placeholder="Търси по име..." oninput="renderUI()">
        <div id="personFilters" class="filter-buttons"></div>
        <div id="modeFilters" class="filter-buttons"></div>
        <button onclick="refreshData()" style="width:100%; padding:12px; background:#148F77; color:white; border:none; border-radius:4px;">Опресни данни</button>
    </div>
    <div id="medGrid"></div>
    
    <div id="editPanel" class="panel">
        <h2 id="panelTitle">Редактиране</h2>
        <button onclick="document.getElementById('editPanel').style.display='none'" style="margin:10px 0; padding: 10px 20px;">Затвори</button>
        <div id="panelBody"></div>
        <button onclick="saveMed()" style="padding:15px; width:100%; background:#148F77; color:white; border:none; font-weight:bold;">ЗАПАЗИ ВСИЧКИ ПРОМЕНИ</button>
    </div>

    <script>
        const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
        let state = { meds: [], currentId: null };

        async function refreshData() {
            const { data: meds } = await client.from('medications').select('*');
            state.meds = meds;
            renderUI();
        }

        function renderUI() {
            const search = document.getElementById('search').value.toLowerCase();
            document.getElementById('medGrid').innerHTML = state.meds.filter(m => m.name_bg.toLowerCase().includes(search))
                .map(m => `<div class="card" onclick="openPanel('${m.id}')"><h3>${m.name_bg}</h3></div>`).join('');
        }

        function openPanel(id) {
            const m = state.meds.find(x => x.id == id);
            state.currentId = id;
            document.getElementById('panelTitle').innerText = m.name_bg;
            document.getElementById('panelBody').innerHTML = `
                <div class="form-group"><label>Име (БГ)</label><input type="text" id="name_bg" value="${m.name_bg||''}"></div>
                <div class="form-group"><label>ЗОК (Здравна каса)</label><input type="checkbox" id="health_ins" ${m.health_insurance ? 'checked' : ''}></div>
                <div class="form-group"><label>Дозировка</label><input type="text" id="dosage" value="${m.dosage||''}"></div>
                <div class="form-group"><label>Описание</label><textarea id="desc">${m.description||''}</textarea></div>
            `;
            document.getElementById('editPanel').style.display = 'block';
        }

        async function saveMed() {
            const updates = { 
                name_bg: document.getElementById('name_bg').value, 
                health_insurance: document.getElementById('health_ins').checked,
                dosage: document.getElementById('dosage').value,
                description: document.getElementById('desc').value 
            };
            await client.from('medications').update(updates).eq('id', state.currentId);
            document.getElementById('editPanel').style.display = 'none';
            refreshData();
        }
        window.onload = refreshData;
    </script>
</body>
</html>
