<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Здравен мениджър</title>
    <!-- Зареждаме конфигурацията -->
    <script src="config.js"></script>
</head>
<body>
    <div class="container">
        <!-- Твоят HTML тук -->
        <h1>Здравен мениджър</h1>
        <button onclick="refreshData()">Опресни</button>
        <div id="medGrid"></div>
    </div>

    <script>
        // Инициализираме state с празни стойности
        let state = { key: '', meds: [] };

        async function refreshData() {
            // ТУК правим проверката: Ако CONFIG е зареден, взимаме данните от него
            if (typeof CONFIG !== 'undefined') {
                state.key = CONFIG.KEY;
                const SUPABASE_URL = CONFIG.URL;
                
                const h = { 'apikey': state.key, 'Authorization': 'Bearer ' + state.key };
                try {
                    const response = await fetch(SUPABASE_URL + '/rest/v1/medications?select=*', {headers: h});
                    state.meds = await response.json();
                    console.log("Данните са заредени!");
                    // renderUI(); // Извикай функцията си за визуализация
                } catch (e) {
                    console.error("Грешка при заявката:", e);
                }
            } else {
                alert("Грешка: config.js не е зареден правилно (обектът CONFIG липсва)!");
            }
        }

        // Изчакваме страницата да зареди
        window.onload = refreshData;
    </script>
</body>
</html>
