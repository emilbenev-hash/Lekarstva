<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Здравен мениджър</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #667eea; padding: 10px; margin: 0; }
        .header { background: #148F77; color: white; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 10px; }
        .filters { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .filter-row { display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
        .filter-btn { flex: 1; padding: 8px; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-size: 12px; }
        .filter-btn.active { background: #148F77; color: white; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .panel { position: fixed; right: 0; top: 0; width: 100%; height: 100%; background: white; padding: 20px; display: none; overflow-y: auto; z-index: 1000; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header"><h1>Здравен мениджър</h1></div>
    <div class="filters">
        <input type="text" id="search" style="width:100%; padding:10px; margin-bottom:5px;" placeholder="Търси..." oninput="renderUI()">
        <div class="filter-row" id="personFilters"></div>
        <div class="filter-row" id="modeFilters"></div>
        <div class="filter-row" id="zokFilters"></div>
        <button onclick="refreshData()" style="width:100%; padding:10px; background:#148F77; color:white; border:none; margin-top:5px;">Опресни данни</button>
    </div>
    <div id="medGrid"></div>
    <div id="editPanel" class="panel">
        <h2 id="panelTitle">Редактиране</h2>
        <button onclick="document.getElementById('editPanel').style.display='none'" style="padding: 10px;">Затвори</button>
        <div id="panelBody"></div>
        <button onclick="saveMed()" style="width:100%; padding:15px; background:#148F77; color:white; border:none; margin-top:10px;">ЗАПАЗИ</button>
    </div>
    <script>
        const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
        let state = { selectedPerson: 'all', selectedMode: 'all', selectedZok: 'all', meds: [], currentId: null };
        async function refreshData() { const { data } = await client.from('medications').select('*'); state.meds = data; renderUI(); }
        function renderUI() {
            document.getElementById('personFilters').innerHTML = ['Лили', 'Емил', 'all'].map(p => `<button class="filter-btn ${state.selectedPerson===p.toLowerCase()?'active':''}" onclick="state.selectedPerson='${p.toLowerCase()}'; renderUI()">${p.toUpperCase()}</button>`).join('');
            document.getElementById('modeFilters').innerHTML = ['daily', 'all'].map(m => `<button class="filter-btn ${state.selectedMode===m?'active':''}" onclick="state.selectedMode='${m}'; renderUI()">${m==='daily'?'Ежедневни':'Всички'}</button>`).join('');
            document.getElementById('zokFilters').innerHTML = [true, false, 'all'].map(z => `<button class="filter-btn ${state.selectedZok===z?'active':''}" onclick="state.selectedZok=${z}; renderUI()">${z===true?'Само ЗОК':z===false?'Без ЗОК':'Всички'}</button>`).join('');
            const search = document.getElementById('search').value.toLowerCase();
            document.getElementById('medGrid').innerHTML = state.meds.filter(m => (state.selectedPerson === 'all' || m.owner === state.selectedPerson) && (state.selectedZok === 'all' || m.health_insurance === state.selectedZok) && m.name_bg.toLowerCase().includes(search)).map(m => `<div class="card" onclick="openPanel('${m.id}')"><h3>${m.name_bg}</h3></div>`).join('');
        }
        function openPanel(id) {
            const m = state.meds.find(x => x.id == id); state.currentId = id; document.getElementById('panelTitle').innerText = m.name_bg;
            document.getElementById('panelBody').innerHTML = `<div class="form-group"><label>Име (БГ)</label><input type="text" id="name_bg" value="${m.name_bg||''}"></div><div class="form-group"><label>ЗОК</label><input type="checkbox" id="health_ins" ${m.health_insurance ? 'checked' : ''}></div><div class="form-group"><label>Дозировка</label><input type="text" id="dosage" value="${m.dosage||''}"></div><div class="form-group"><label>Описание</label><textarea id="desc">${m.description||''}</textarea></div>`;
            document.getElementById('editPanel').style.display = 'block';
        }
        async function saveMed() { const updates = { name_bg: document.getElementById('name_bg').value, health_insurance: document.getElementById('health_ins').checked, dosage: document.getElementById('dosage').value, description: document.getElementById('desc').value }; await client.from('medications').update(updates).eq('id', state.currentId); document.getElementById('editPanel').style.display = 'none'; refreshData(); }
        window.onload = refreshData;
    </script>
</body>
</html>
