<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Здравен мениджър</title>
    <!-- Първо зареждаме конфигурацията -->
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; font-size: 16px; }
        body { background: #667eea; padding: 10px; }
        .header { background: #148F77; color: white; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 10px; }
        .search-input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-refresh { width: 100%; padding: 15px; background: #148F77; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>Здравен мениджър</h1></div>
    <input type="text" id="search" class="search-input" placeholder="Търси лекарство..." oninput="renderUI()">
    <button class="btn-refresh" onclick="refreshData()">ОПРЕСНИ ДАННИ</button>
    <div id="medGrid" class="grid" style="margin-top: 15px;"></div>

    <script>
        // Дебъг: Ако нещо се счупи, ще го видим на екрана
        window.onerror = function(msg, url, line) { alert("Грешка: " + msg + "\nРед: " + line); };

        let state = { meds: [] };

        async function refreshData() {
            if (typeof CONFIG === 'undefined') {
                alert("Грешка: config.js не е зареден!");
                return;
            }

            const h = { 'apikey': CONFIG.KEY, 'Authorization': 'Bearer ' + CONFIG.KEY };
            try {
                const response = await fetch(CONFIG.URL + '/rest/v1/medications?select=*', {headers: h});
                state.meds = await response.json();
                renderUI();
            } catch (e) {
                alert("Грешка при връзка: " + e.message);
            }
        }

        function renderUI() {
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = state.meds.filter(m => m.name_bg.toLowerCase().includes(search));
            
            document.getElementById('medGrid').innerHTML = filtered.map(m => `
                <div class="card"><h3>${m.name_bg}</h3></div>
            `).join('');
        }

        // Автоматично зареждане при старт
        window.onload = refreshData;
    </script>
</body>
</html>
