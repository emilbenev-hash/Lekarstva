<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Здравен мениджър</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #667eea; padding: 10px; margin: 0; }
        .header { background: #148F77; color: white; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 10px; }
        .filters { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .search-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .filter-buttons { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .filter-btn { flex: 1; padding: 10px; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-size: 14px; }
        .filter-btn.active { background: #148F77; color: white; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .panel { position: fixed; right: 0; top: 0; width: 100%; height: 100%; background: white; padding: 20px; display: none; overflow-y: auto; z-index: 1000; }
        .form-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .form-group { flex: 1; margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #555; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header"><h1>Здравен мениджър</h1></div>
    <div class="filters">
        <input type="text" id="search" class="search-input" placeholder="Търси по име..." oninput="renderUI()">
        <div id="personFilters" class="filter-buttons"></div>
        <div id="modeFilters" class="filter-buttons"></div>
        <button onclick="refreshData()" style="width:100%; padding:10px; background:#148F77; color:white; border:none; border-radius:4px;">Опресни данни</button>
    </div>
    <div id="medGrid"></div>
    
    <div id="editPanel" class="panel">
        <h2 id="panelTitle">Редактиране</h2>
        <button onclick="document.getElementById('editPanel').style.display='none'" style="width:100%; padding:10px; margin:10px 0; background:#eee; border:none;">Затвори</button>
        <div id="panelBody"></div>
        <button onclick="saveMed()" style="padding:15px; width:100%; background:#148F77; color:white; border:none; font-weight:bold;">ЗАПАЗИ ВСИЧКИ ПРОМЕНИ</button>
    </div>

    <script>
        let state = { selectedPerson: 'all', selectedMode: 'all', meds: [], pharmacies: [] };

        async function refreshData() {
            const h = { 'apikey': CONFIG.KEY, 'Authorization': 'Bearer ' + CONFIG.KEY };
            const [persons, pharmacies, medPersons, purchases] = await Promise.all([
                fetch(CONFIG.URL + '/rest/v1/persons', {headers: h}).then(r => r.json()),
                fetch(CONFIG.URL + '/rest/v1/pharmacies', {headers: h}).then(r => r.json()),
                fetch(CONFIG.URL + '/rest/v1/medication_persons', {headers: h}).then(r => r.json()),
                fetch(CONFIG.URL + '/rest/v1/purchases', {headers: h}).then(r => r.json())
            ]);
            state.pharmacies = pharmacies;
            let url = CONFIG.URL + '/rest/v1/medications?select=*';
            if (state.selectedMode === 'daily') url += '&is_daily=eq.true';
            
            let allMeds = await fetch(url, {headers: h}).then(r => r.json());
            state.meds = allMeds.map(med => {
                const p = purchases.filter(x => x.medication_id === med.id);
                const lowest = p.length > 0 ? p.reduce((min, cur) => cur.price_eur < min.price_eur ? cur : min) : null;
                const owner = persons.find(p => p.id === medPersons.find(mp => mp.medication_id === med.id)?.person_id)?.name.toLowerCase() || 'all';
                return { ...med, lowestPrice: lowest?.price_eur, lowestPharmacy: pharmacies.find(ph => ph.id === lowest?.pharmacy_id)?.name, owner };
            });
            renderUI();
        }

        function renderUI() {
            document.getElementById('personFilters').innerHTML = ['Лили', 'Емил', 'all'].map(p => 
                `<button class="filter-btn ${state.selectedPerson===p.toLowerCase()?'active':''}" onclick="state.selectedPerson='${p.toLowerCase()}'; refreshData()">${p.toUpperCase()}</button>`).join('');
            document.getElementById('modeFilters').innerHTML = ['daily', 'all'].map(m => 
                `<button class="filter-btn ${state.selectedMode===m?'active':''}" onclick="state.selectedMode='${m}'; refreshData()">${m==='daily'?'Ежедневни':'Всички'}</button>`).join('');
            
            const search = document.getElementById('search').value.toLowerCase();
            document.getElementById('medGrid').innerHTML = state.meds.filter(m => m.name_bg.toLowerCase().includes(search))
                .map(med => `<div class="card" onclick="openPanel('${med.id}')"><h3>${med.name_bg}</h3><p>💶 ${med.lowestPrice ? med.lowestPrice.toFixed(2) + ' EUR (' + med.lowestPharmacy + ')' : 'Няма цена'}</p></div>`).join('');
        }

        function openPanel(id) {
            const m = state.meds.find(x => x.id == id);
            document.getElementById('panelTitle').innerText = m.name_bg;
            document.getElementById('panelBody').innerHTML = `
                <div class="form-row"><div class="form-group"><label>Име (БГ)</label><input type="text" id="name_bg" value="${m.name_bg||''}"></div>
                <div class="form-group"><label>Име (Лат)</label><input type="text" id="name_latin" value="${m.name_latin||''}"></div></div>
                <div class="form-group"><label>Активно вещество</label><input type="text" id="active" value="${m.active_substance||''}"></div>
                <div class="form-row"><div class="form-group"><label>Количество</label><input type="number" id="vol" value="${m.volume_quantity||''}"></div>
                <div class="form-group"><label>Единица</label><input type="text" id="unit" value="${m.volume_unit||''}"></div></div>
                <div class="form-row"><div class="form-group"><label>Форма</label><input type="text" id="form" value="${m.form||''}"></div>
                <div class="form-group"><label>Брой в оп.</label><input type="number" id="qty" value="${m.form_quantity||''}"></div></div>
                <div class="form-group"><label>Дозировка</label><input type="text" id="dosage" value="${m.dosage||''}"></div>
                <div class="form-group"><label>Описание</label><textarea id="desc">${m.description||''}</textarea></div>
                <div class="form-group"><label>Собственик</label><select id="owner"><option value="all" ${m.owner==='all'?'selected':''}>Всички</option>
                <option value="лили" ${m.owner==='лили'?'selected':''}>Лили</option><option value="емил" ${m.owner==='емил'?'selected':''}>Емил</option></select></div>
                <div class="form-row"><div class="form-group"><label><input type="checkbox" id="is_daily" ${m.is_daily?'checked':''}> Ежедневно</label></div>
                <div class="form-group"><label><input type="checkbox" id="health_ins" ${m.health_insurance?'checked':''}> Здр. каса</label></div></div>
                <div class="form-group"><label>Производител ID</label><input type="text" id="man_id" value="${m.manufacturer_id||''}"></div>
                <div class="form-group"><label>Категория ID</label><input type="text" id="cat_id" value="${m.category_id||''}"></div>
                <div class="form-group"><label>Лекар ID</label><input type="text" id="doc_id" value="${m.doctor_id||''}"></div>`;
            document.getElementById('editPanel').style.display = 'block';
            state.currentId = id;
        }

        async function saveMed() { alert("Тук добавете PATCH заявка за ID: " + state.currentId); document.getElementById('editPanel').style.display = 'none'; }
        window.onload = refreshData;
    </script>
</body>
</html>
