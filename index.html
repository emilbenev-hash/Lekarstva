<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моите лекарства</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- ЗАДЪЛЖИТЕЛНО зареждане на config.js -->
    <script src="config.js"></script> 
</head>
<body>
    <h1>Моите лекарства</h1>
    <div id="list">Зареждане на списъка...</div>

    <script>
        // Добавяме проверка за CONFIG, за да не се чупи при грешка
        window.onload = async () => {
            const listDiv = document.getElementById('list');
            
            if (typeof CONFIG === 'undefined') {
                listDiv.innerHTML = '<span style="color:red">Грешка: config.js не е зареден! Проверете името на файла в GitHub.</span>';
                return;
            }

            try {
                const client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
                const { data, error } = await client.from('medications').select('*');
                
                if (error) throw error;
                
                listDiv.innerHTML = data.map(med => `
                    <div style="border-bottom: 1px solid #ccc; padding: 10px;">
                        <strong>${med.name_bg || 'Без име'}</strong>
                    </div>
                `).join('');
            } catch (err) {
                listDiv.innerHTML = `<span style="color:red">Грешка: ${err.message}</span>`;
            }
        };
    </script>
</body>
</html>
