<script>
    async function refreshData() {
        console.log("1. Опитвам се да заредя данни...");
        
        // Проверка дали конфигурацията съществува
        if (typeof CONFIG === 'undefined') {
            alert("Грешка: Обектът CONFIG липсва!");
            console.error("CONFIG не е дефиниран. Провери дали config.js е зареден.");
            return;
        }

        console.log("2. CONFIG е намерен. URL:", CONFIG.URL);
        
        const h = { 'apikey': CONFIG.KEY, 'Authorization': 'Bearer ' + CONFIG.KEY };
        
        try {
            // Само тестваме дали изобщо можем да достъпим API-то
            const response = await fetch(CONFIG.URL + '/rest/v1/medications?select=*', {headers: h});
            
            console.log("3. Отговор от сървъра:", response.status);
            
            if (!response.ok) {
                alert("Грешка при връзката с базата: " + response.status);
                return;
            }

            const data = await response.json();
            console.log("4. Данните са получени:", data);
            
            state.meds = data;
            // Тук извикваме рендирането, след като вече сме сигурни, че имаме данни
            renderUI(); 
            
        } catch (e) {
            console.error("5. Фатална грешка при fetch:", e);
            alert("Грешка: " + e.message);
        }
    }

    // Рендиращ механизъм (само тест)
    function renderUI() {
        console.log("6. Рендирам...");
        const container = document.getElementById('medGrid');
        if (!container) { console.error("Грешка: няма елемент medGrid!"); return; }
        
        container.innerHTML = state.meds.map(m => `
            <div class="card"><h3>${m.name_bg || 'Без име'}</h3></div>
        `).join('');
    }

    window.onload = refreshData;
</script>
